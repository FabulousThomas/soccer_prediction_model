version: '3.8'
services:
  ai-service:
    build: ./ai_service
    container_name: soccer_prediction_api
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service:/app
    restart: always

  web-app:
    build: ./web
    container_name: soccer_prediction_web
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - ai-service
    restart: always

  # 3. Database (Optional, for storing user picks/history)
  db:
    image: mysql:8.0
    container_name: soccer_prediction_db
    environment:
      MYSQL_ROOT_PASSWORD: soccer_prediction
      MYSQL_DATABASE: soccer_predictions
    ports:
      - "3307:3306"
    restart: always